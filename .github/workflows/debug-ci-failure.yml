name: Debug CI Failure

on:
  workflow_run:
    workflows:
      - "Build CI Image"
      - "Auto-Update Ebuilds"
      - "Verify Ebuilds"
    types:
      - completed
  workflow_dispatch:
    inputs:
      workflow_name:
        description: 'Name of the failed workflow (e.g. "Verify Ebuilds")'
        required: true
        type: string
      run_id:
        description: 'Run ID of the failed workflow run'
        required: true
        type: string
      head_branch:
        description: 'Branch that triggered the failure (e.g. auto-update/dev-util-worktrunk)'
        required: true
        type: string

permissions:
  actions: read
  contents: write
  pull-requests: write
  issues: write

jobs:
  debug:
    # workflow_run: only fire for failures.
    # workflow_dispatch: always run — the human explicitly requested it.
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest

    steps:
      - name: Generate bot token
        id: bot-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.BOT_APP_ID }}
          private_key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.bot-token.outputs.token }}

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        env:
          REPO: ${{ github.repository }}
          BOT_TOKEN: ${{ steps.bot-token.outputs.token }}
          BOT_APP_ID: ${{ secrets.BOT_APP_ID }}
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global user.name "divoxx-bot[bot]"
          git config --global user.email "${BOT_APP_ID}+divoxx-bot[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${BOT_TOKEN}@github.com/${REPO}.git"

      - name: Resolve context
        id: ctx
        env:
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          WR_WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          WR_RUN_ID: ${{ github.event.workflow_run.id }}
          WR_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WR_RUN_URL: ${{ github.event.workflow_run.html_url }}
          WD_WORKFLOW_NAME: ${{ github.event.inputs.workflow_name }}
          WD_RUN_ID: ${{ github.event.inputs.run_id }}
          WD_HEAD_BRANCH: ${{ github.event.inputs.head_branch }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            WORKFLOW_NAME="$WD_WORKFLOW_NAME"
            RUN_ID="$WD_RUN_ID"
            HEAD_BRANCH="$WD_HEAD_BRANCH"
            RUN_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
            MANUAL=true
          else
            WORKFLOW_NAME="$WR_WORKFLOW_NAME"
            RUN_ID="$WR_RUN_ID"
            HEAD_BRANCH="$WR_HEAD_BRANCH"
            RUN_URL="$WR_RUN_URL"
            MANUAL=false
          fi
          echo "workflow_name=${WORKFLOW_NAME}" >> "$GITHUB_OUTPUT"
          echo "run_id=${RUN_ID}"               >> "$GITHUB_OUTPUT"
          echo "head_branch=${HEAD_BRANCH}"      >> "$GITHUB_OUTPUT"
          echo "run_url=${RUN_URL}"              >> "$GITHUB_OUTPUT"
          echo "manual=${MANUAL}"                >> "$GITHUB_OUTPUT"

      - name: Checkout target branch (verify failures only)
        if: steps.ctx.outputs.workflow_name == 'Verify Ebuilds'
        env:
          HEAD_BRANCH: ${{ steps.ctx.outputs.head_branch }}
        run: |
          set -euo pipefail
          git fetch origin "$HEAD_BRANCH"
          git checkout "$HEAD_BRANCH"

      - name: Check for existing fix (idempotency)
        id: idempotency
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          WORKFLOW_NAME: ${{ steps.ctx.outputs.workflow_name }}
          HEAD_BRANCH: ${{ steps.ctx.outputs.head_branch }}
          MANUAL: ${{ steps.ctx.outputs.manual }}
        run: |
          set -euo pipefail

          if [ "$WORKFLOW_NAME" = "Verify Ebuilds" ] && [[ "$HEAD_BRANCH" == auto-update/* ]]; then
            # Auto-update branch: debugger fixes the ebuild in-place on the same branch.
            # Guard against a human branch named auto-update/* — only process bot-created PRs.
            if [ "$MANUAL" != "true" ]; then
              PR_AUTHOR=$(gh pr list \
                --head "$HEAD_BRANCH" \
                --state open \
                --json author \
                --repo "$REPO" \
                -q '.[0].author.login // empty')

              if [ "${PR_AUTHOR:-}" != "github-actions[bot]" ] && [ "${PR_AUTHOR:-}" != "divoxx-bot[bot]" ]; then
                echo "PR on $HEAD_BRANCH was not created by a known bot (got: ${PR_AUTHOR:-none}) — skipping"
                echo "skip=true" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            fi

            # Skip if the last commit is already a bot fix to prevent infinite retry loops.
            # Manual dispatch bypasses this — the human wants a fresh attempt.
            LAST_MSG=$(git log -1 --format='%s' 2>/dev/null || echo "")
            if [ "$MANUAL" != "true" ] && [[ "$LAST_MSG" == "ci: fix"* ]]; then
              echo "Last commit is already a bot fix attempt — skipping to avoid loop"
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              echo "branch=${HEAD_BRANCH}" >> "$GITHUB_OUTPUT"
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          else
            # For build-image, auto-update, and non-auto-update verify failures:
            # skip if ANY open ci-fix PR already exists for the same workflow,
            # regardless of date. These failures recur (e.g. the weekly image
            # build); the fix branch embeds today's date, so matching only the
            # exact dated branch let one near-duplicate PR pile up per run.
            SLUG=$(echo "$WORKFLOW_NAME" | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | tr -cd '[:alnum:]-')
            DATE=$(date +%Y-%m-%d)
            BRANCH="ci-fix/${SLUG}-${DATE}"
            echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

            # Match every open PR whose head branch starts with ci-fix/<slug>-.
            # SLUG is sanitized to [:alnum:]- above, so inlining it into the jq
            # filter is safe.
            EXISTING=$(gh pr list \
              --state open \
              --json number,headRefName \
              --repo "$REPO" \
              -q "[.[] | select(.headRefName | startswith(\"ci-fix/${SLUG}-\"))] | .[0].number // empty")

            if [ -n "${EXISTING:-}" ]; then
              echo "Fix PR #$EXISTING already open for ci-fix/${SLUG}-* — skipping"
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Fetch failure logs
        if: steps.idempotency.outputs.skip == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ steps.ctx.outputs.run_id }}
        run: |
          set -euo pipefail
          gh run view "$RUN_ID" --log-failed --repo "$REPO" 2>&1 \
            | tail -c 50000 > /tmp/failure-logs.txt || true

      - name: Run ci-debugger agent
        if: steps.idempotency.outputs.skip == 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BOT_TOKEN: ${{ steps.bot-token.outputs.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ steps.ctx.outputs.run_id }}
          RUN_URL: ${{ steps.ctx.outputs.run_url }}
          WORKFLOW_NAME: ${{ steps.ctx.outputs.workflow_name }}
          HEAD_BRANCH: ${{ steps.ctx.outputs.head_branch }}
          FIX_BRANCH: ${{ steps.idempotency.outputs.branch }}
        run: |
          set -euo pipefail
          LOGS=$(cat /tmp/failure-logs.txt)

          printf '%s\n' \
            "Use the ci-debugger agent to analyze a CI workflow failure and either fix it or explain it." \
            "" \
            "## Context" \
            "- Workflow: ${WORKFLOW_NAME}" \
            "- Run ID: ${RUN_ID}" \
            "- Run URL: ${RUN_URL}" \
            "- Repository: ${REPO}" \
            "- Head branch (branch that triggered the failure): ${HEAD_BRANCH}" \
            "- Fix branch to use if fixable: ${FIX_BRANCH}" \
            "" \
            "## Failed Job Logs (last 50 000 chars)" \
            '```' \
            "${LOGS}" \
            '```' \
            | timeout 1800 claude --print \
                --allowedTools "Task,Read,Write,Edit,Bash,Glob,Grep,WebFetch,WebSearch"

          # Fail the job if the agent did not write a success result.
          # This catches push failures, agent crashes, and cases where the
          # agent gave up without taking any action.
          RESULT=$(cat /tmp/ci-debugger-result 2>/dev/null || echo "")
          if [[ "$RESULT" != "success"* ]]; then
            echo "::error::ci-debugger did not complete successfully: ${RESULT:-no result written}"
            exit 1
          fi
