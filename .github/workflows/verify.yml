name: Verify Ebuilds

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.detect.outputs.packages }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
      should_skip: ${{ steps.skip.outputs.should_skip }}
    steps:
      - name: Check for superseding runs
        id: skip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          set -euo pipefail
          NEWER=$(gh run list \
            --workflow verify.yml \
            --branch "$BRANCH" \
            --repo "$REPO" \
            --json databaseId,status \
            --jq "[.[] | select(.databaseId > ($RUN_ID | tonumber) and (.status == \"queued\" or .status == \"in_progress\"))] | length")
          if [ "$NEWER" -gt 0 ]; then
            echo "Newer run detected — skipping"
            echo "should_skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.skip.outputs.should_skip != 'true'
        with:
          fetch-depth: 0

      - name: Detect changed ebuilds
        id: detect
        if: steps.skip.outputs.should_skip != 'true'
        env:
          BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail

          if [ "$GITHUB_REF_NAME" = "main" ]; then
            MERGE_BASE="$BEFORE"
          else
            MERGE_BASE=$(git merge-base HEAD origin/main)
          fi
          CHANGED=$(git diff --name-only "$MERGE_BASE" HEAD)

          EBUILD_CHANGES=$(echo "$CHANGED" | grep '\.ebuild$' || true)
          PACKAGES=$(echo "$EBUILD_CHANGES" \
            | awk -F/ 'NF >= 3 {print $1"/"$2}' \
            | sort -u \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')

          echo "packages=$PACKAGES" >> "$GITHUB_OUTPUT"

          if [ "$PACKAGES" = "[]" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

  verify:
    needs: detect-changes
    if: needs.detect-changes.outputs.should_skip != 'true' && needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/gentoo-ci:latest
    strategy:
      matrix:
        package: ${{ fromJson(needs.detect-changes.outputs.packages) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Verify ebuild
        env:
          PACKAGE: ${{ matrix.package }}
        run: |
          set -euo pipefail
          bash "$GITHUB_WORKSPACE/scripts/verify-ebuild.sh" "$PACKAGE"

  promote:
    needs: verify
    if: startsWith(github.head_ref || github.ref_name, 'auto-update/')
    runs-on: ubuntu-latest
    steps:
      - name: Promote draft PR to ready
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          set -euo pipefail

          PR=$(gh pr list \
            --head "$BRANCH" \
            --state open \
            --json number,isDraft \
            --repo "$REPO" \
            -q '.[0] // empty')

          if [ -z "$PR" ]; then
            echo "No open PR for $BRANCH — skipping"
            exit 0
          fi

          IS_DRAFT=$(echo "$PR" | jq -r '.isDraft')
          PR_NUMBER=$(echo "$PR" | jq -r '.number')

          if [ "$IS_DRAFT" = "true" ]; then
            echo "Promoting PR #$PR_NUMBER to ready for review"
            gh pr ready "$PR_NUMBER" --repo "$REPO"
          else
            echo "PR #$PR_NUMBER is already ready for review — skipping"
          fi
